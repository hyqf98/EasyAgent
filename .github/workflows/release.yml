name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Plugin
        run: ./gradlew buildPlugin -PideaLocalPath=

      - name: Extract Version Info
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          SINCE=$(grep 'since-build' src/main/resources/META-INF/plugin.xml | sed 's/.*since-build="\([^"]*\)".*/\1/')
          echo "since=$SINCE" >> $GITHUB_OUTPUT
          echo "zip_name=EasyAgent-${VERSION}-IDEA${SINCE}+" >> $GITHUB_OUTPUT

      - name: Rename ZIP
        run: |
          mv build/distributions/EasyAgent-*.zip "build/distributions/${{ steps.version.outputs.zip_name }}.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: EasyAgent ${{ steps.version.outputs.version }}
          body: |
            ## EasyAgent ${{ steps.version.outputs.version }}

            **Supported IDEA versions:** ${{ steps.version.outputs.since }}+

            ### Installation
            1. Download `EasyAgent-${{ steps.version.outputs.version }}-IDEA${{ steps.version.outputs.since }}+.zip`
            2. In IntelliJ IDEA: `Settings` → `Plugins` → `⚙️` → `Install Plugin from Disk...`
            3. Select the downloaded ZIP file
            4. Restart IDE
          files: build/distributions/${{ steps.version.outputs.zip_name }}.zip
          draft: false
          prerelease: false
