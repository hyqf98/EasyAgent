<template>
<div class="session-pane" :class="{ focused: isFocused }" @click="onFocus">
    <div class="pane-header" @mousedown="onHeaderMouseDown">
        <div class="pane-header-left">
            <span class="pane-drag-handle" title="Drag">⠿</span>
            <span class="dot" :class="cliTypeLower"></span>
            <span class="pane-title">{{ paneTitle }}</span>
        </div>
        <div class="pane-header-right" @mousedown.stop>
            <button v-if="store.getPaneCount() > 1" class="icon-btn pane-close-btn" @click.stop="$emit('close', paneId)">✕</button>
        </div>
    </div>
    <div class="pane-messages" ref="messagesArea" @scroll="onMessagesScroll">
        <div v-if="isLoading" class="loading-skeleton">
            <div class="skeleton-row" v-for="i in 3" :key="'sk-'+i">
                <div class="skeleton-avatar"></div>
                <div class="skeleton-content">
                    <div class="skeleton-line" :style="{ width: (80 - i * 15) + '%' }"></div>
                    <div class="skeleton-line short" :style="{ width: (60 - i * 10) + '%' }"></div>
                </div>
            </div>
        </div>
        <div v-if="!isLoading && paneMessages.length === 0 && !isStreaming" class="chat-welcome">
            <div class="chat-welcome-emoji">💬</div>
            <div class="chat-welcome-title">{{ i18n.t('chat.welcomeTitle') }}</div>
            <div class="chat-welcome-desc">{{ i18n.t('chat.welcomeDesc') }}</div>
        </div>
        <template v-if="!isLoading && paneMessages.length > 0">
            <div class="virtual-spacer-top" :style="{ height: virtualTopPadding + 'px' }"></div>
            <message-bubble
                v-for="(msg, vIdx) in virtualVisibleMessages"
                :key="virtualStart + vIdx"
                :message="msg"
                :is-last="virtualStart + vIdx === paneMessages.length - 1"
                :show-retry="virtualStart + vIdx === paneMessages.length - 1 && canRetry"
                @retry="onRetry"
                @stop="onStop"
            ></message-bubble>
            <div class="virtual-spacer-bottom" :style="{ height: virtualBottomPadding + 'px' }"></div>
        </template>
    </div>
    <div v-if="showScrollBottom" class="scroll-bottom-btn" @click="scrollToBottom">
        <span class="scroll-bottom-inner"><span class="scroll-bottom-arrow">↓</span></span>
    </div>
    <pending-queue
        :items="pendingQueue"
        @remove="removePending"
        @update="updatePending"
    ></pending-queue>
    <input-bar
        :is-streaming="isStreaming"
        :disabled="false"
        @send="onSend"
        @stop="onStop"
    ></input-bar>
</div>
</template>
