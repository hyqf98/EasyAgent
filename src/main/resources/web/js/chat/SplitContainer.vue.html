<template>
<div class="split-container" ref="container">
    <template v-for="(row, rowIdx) in paneGrid" :key="'row-' + rowIdx">
        <div
            class="split-row"
            :style="getRowHeightStyle(rowIdx)"
        >
            <template v-for="(paneId, colIdx) in row" :key="paneId">
                <div
                    class="split-pane-wrapper"
                    :class="{
                        'drag-source': draggingPaneId === paneId,
                        'drop-left': dropTarget && dropTarget.row === rowIdx && dropTarget.col === colIdx && dropTarget.position === 'before',
                        'drop-right': dropTarget && dropTarget.row === rowIdx && dropTarget.col === colIdx && dropTarget.position === 'after',
                        'drop-below': dropTarget && dropTarget.row === rowIdx && dropTarget.col === colIdx && dropTarget.position === 'new-row-below'
                    }"
                    :data-pane-id="paneId"
                    :data-row="rowIdx"
                    :data-col="colIdx"
                    :style="getColWidthStyle(rowIdx, colIdx)"
                >
                    <session-pane
                        :pane-id="paneId"
                        :session-id="getPaneProp(paneId, 'sessionId')"
                        :cli-type="getPaneProp(paneId, 'cliType')"
                        :pane-title="getPaneProp(paneId, 'title')"
                        @close="onPaneClose"
                        @focus="onPaneFocus"
                        @pane-drag-start="onPaneDragStart"
                    ></session-pane>
                </div>
                <div
                    v-if="hasColResizer(rowIdx, colIdx)"
                    class="split-resizer split-resizer-col"
                    @mousedown="onColResizeStart(rowIdx, colIdx, $event)"
                ></div>
            </template>
        </div>
        <div
            v-if="hasRowResizer(rowIdx)"
            class="split-resizer split-resizer-row"
            @mousedown="onRowResizeStart(rowIdx, $event)"
        ></div>
    </template>
    <div v-if="draggingPaneId" class="drag-overlay"></div>
</div>
</template>
