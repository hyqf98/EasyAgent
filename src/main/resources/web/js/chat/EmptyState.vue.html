<template>
<div class="empty-state">
    <div class="empty-state-logo">🤖</div>
    <div class="empty-state-title">{{ i18n.t('app.title') }}</div>
    <template v-if="cliChecked && hasCLIs">
        <div class="empty-state-desc">{{ i18n.t('welcome.desc') }}</div>
        <div class="empty-state-clis">
            <div v-for="cli in cliCards" :key="cli.type"
                 class="empty-cli-card"
                 :class="{ disabled: !cli.available }"
                 @click="cli.available && selectCLI(cli.type)">
                <span class="cli-emoji">{{ cli.emoji }}</span>
                <span class="cli-label">{{ cli.label }}</span>
                <span v-if="!cli.available" class="cli-unavailable">—</span>
            </div>
        </div>
        <div class="empty-state-hint">{{ i18n.t('welcome.hint') }}</div>
    </template>
    <template v-if="cliChecked && !hasCLIs">
        <div class="empty-state-desc">{{ i18n.t('welcome.noCliDesc') }}</div>
        <div class="empty-state-install-hint">
            <div class="install-item" v-for="item in installItems" :key="item.name">
                <span class="install-name">{{ item.name }}</span>
                <code class="install-cmd">{{ item.cmd }}</code>
            </div>
        </div>
    </template>
</div>
</template>
