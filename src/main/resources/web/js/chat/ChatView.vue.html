<template>
<div class="chat-panel">
    <div v-if="toastMessage" class="global-toast">{{ toastMessage }}</div>
    <chat-header
        :cli-type="store.cliType"
        :session-title="store.sessionTitle"
        :model="store.model"
        :message-count="store.messages.length"
        :in-chat="inChat"
        :show-settings="showSettings"
        @toggle-drawer="toggleDrawer"
        @new-chat="onNewChat"
        @back-home="onBackHome"
        @open-settings="showSettings = true"
        @split-pane="onSplitPane"
    ></chat-header>

    <empty-state
        v-if="!inChat && !showSettings"
        @select-cli="onSelectCLI"
        @open-plan-mode="onOpenPlanMode"
        @open-settings="showSettings = true"
    ></empty-state>

    <ea-page-error-boundary
        v-if="showSettings"
        page-name="settings-page"
        :reset-key="'settings-' + store.currentLocale + '-' + store.i18nVersion"
    >
        <settings-page
            @close="showSettings = false"
        ></settings-page>
    </ea-page-error-boundary>

    <template v-if="inChat && !showSettings">
        <tab-bar
            v-if="store.getPaneCount() > 1"
            @select-pane="onSelectPane"
            @close-pane="onClosePane"
            @add-pane="onNewChat"
        ></tab-bar>
        <split-container
            @close-pane="onClosePane"
            @focus-pane="onFocusPane"
        ></split-container>
    </template>

    <div v-if="showDrawer" class="session-overlay" @click.self="showDrawer = false">
        <div class="session-drawer">
            <div class="drawer-header">
                <h3>{{ i18n.t('session.title') }}</h3>
                <div class="drawer-header-actions">
                    <template v-if="hasSelectedSessions">
                        <button class="icon-btn drawer-action-btn" @click="selectAllSessions">{{ i18n.t('session.selectAll') }}</button>
                        <button class="icon-btn drawer-action-btn" @click="clearSelection">{{ i18n.t('session.clearSelection') }}</button>
                        <button class="icon-btn drawer-delete-btn" :disabled="selectedSessions.length === 0 || isDeletingSessions" @click="confirmDelete">
                            <span v-if="isDeletingSessions" class="delete-spinner"></span>
                            <span v-else>{{ i18n.t('session.delete') }}</span>
                        </button>
                    </template>
                    <button class="icon-btn" @click="showDrawer = false">✕</button>
                </div>
            </div>
            <div class="drawer-list" @scroll="onDrawerScroll" ref="drawerList">
                <div v-if="sessions.length === 0" class="drawer-empty">{{ i18n.t('session.empty') }}</div>
                <div
                    v-for="s in sessions"
                    :key="s.sessionId"
                    class="drawer-item"
                    :class="{ active: isCurrentSession(s), selected: selectedSessions.indexOf(s.sessionId) >= 0 }"
                    @click="onDrawerItemClick(s)"
                >
                    <label class="drawer-checkbox" @click.stop>
                        <input type="checkbox" :checked="selectedSessions.indexOf(s.sessionId) >= 0" @change="toggleSelect(s.sessionId)" />
                        <span class="drawer-checkmark"></span>
                    </label>
                    <div class="dot" :class="(s.cliType || 'claude').toLowerCase()"></div>
                    <div class="drawer-item-info">
                        <div class="drawer-item-title-row">
                            <div class="drawer-item-title">{{ s.title || s.sessionId }}</div>
                            <span v-if="isCurrentSession(s)" class="drawer-item-current">{{ i18n.t('session.current') }}</span>
                        </div>
                        <div class="drawer-item-meta">
                            <span v-if="s.model" class="drawer-item-model">{{ s.model }}</span>
                            {{ formatTime(s.updatedAt || s.createdAt) }}
                        </div>
                    </div>
                </div>
                <div v-if="hasMoreSessions" class="drawer-loadmore" @click="loadMoreSessions">{{ i18n.t('session.loadMore') }}</div>
            </div>
        </div>
    </div>
</div>
</template>
