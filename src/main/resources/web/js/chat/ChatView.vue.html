<template>
<div class="chat-panel">
    <chat-header
        :cli-type="store.cliType"
        :session-title="store.sessionTitle"
        :model="store.model"
        :message-count="store.messages.length"
        :in-chat="inChat"
        @toggle-drawer="toggleDrawer"
        @new-chat="onNewChat"
        @open-settings="showSettings = true"
    ></chat-header>

    <empty-state
        v-if="!inChat && !showSettings"
        @select-cli="onSelectCLI"
        @open-settings="showSettings = true"
    ></empty-state>

    <settings-page
        v-if="showSettings"
        @close="showSettings = false"
    ></settings-page>

    <template v-if="inChat && !showSettings">
        <div class="messages-area" ref="messagesArea" @scroll="onMessagesScroll">
            <div v-if="contextProgress > 0" class="context-progress-bar" :class="contextProgressClass">
                <div class="context-progress-fill" :style="{ width: contextProgress + '%' }"></div>
                <span class="context-progress-label">{{ contextProgressLabel }}</span>
            </div>
            <div v-if="store.isLoading" class="loading-skeleton">
                <div class="skeleton-row" v-for="i in 3" :key="'sk-'+i">
                    <div class="skeleton-avatar"></div>
                    <div class="skeleton-content">
                        <div class="skeleton-line" :style="{ width: (80 - i * 15) + '%' }"></div>
                        <div class="skeleton-line short" :style="{ width: (60 - i * 10) + '%' }"></div>
                    </div>
                </div>
                <div class="loading-hint">
                    <div class="response-loading">
                        <div class="response-loading-dot"></div>
                        <div class="response-loading-dot"></div>
                        <div class="response-loading-dot"></div>
                    </div>
                    <span class="loading-hint-text">{{ i18n.t('chat.loadingHistory') }}</span>
                </div>
            </div>
            <div v-if="!store.isLoading && store.messages.length === 0 && !store.isStreaming" class="chat-welcome">
                <div class="chat-welcome-emoji">💬</div>
                <div class="chat-welcome-title">{{ i18n.t('chat.welcomeTitle') }}</div>
                <div class="chat-welcome-desc">{{ i18n.t('chat.welcomeDesc') }}</div>
            </div>
            <template v-if="!store.isLoading && store.messages.length > 0">
            <message-bubble
                v-for="(msg, idx) in store.messages"
                :key="idx"
                :message="msg"
                :is-last="idx === store.messages.length - 1"
                :show-retry="idx === store.messages.length - 1 && canRetry"
                @retry="onRetry"
            ></message-bubble>
            </template>
            <div v-if="store.isStreaming && !hasActiveAssistantContent" class="message-row assistant">
                <div class="message-bubble">
                    <div class="bubble-header">
                        <span class="role-icon ai-icon">🤖</span>
                        <span>{{ i18n.t('role.assistant') }}</span>
                        <button class="loading-stop-btn" @click="onStop" :title="i18n.t('input.stop')">
                            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" fill="currentColor"/></svg>
                        </button>
                    </div>
                    <div class="bubble-content">
                        <div class="response-loading">
                            <div class="response-loading-dot"></div>
                            <div class="response-loading-dot"></div>
                            <div class="response-loading-dot"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div v-if="store.retryStatus" class="retry-status-bar">
                <span class="retry-status-icon">⟳</span>
                <span class="retry-status-text">{{ i18n.t('chat.retrying', { current: store.retryStatus.currentAttempt, total: store.retryStatus.maxAttempts }) }}</span>
                <button class="retry-stop-btn" @click="onStop">{{ i18n.t('chat.retryStop') }}</button>
            </div>
            <div v-if="store.isStreaming && store.streamingText" class="streaming-cursor" style="padding: 4px 24px;">&nbsp;</div>
            <div v-if="showScrollBottom" class="scroll-bottom-btn" @click="scrollToBottom">
                <span class="scroll-bottom-inner"><span class="scroll-bottom-arrow">↓</span></span>
            </div>
        </div>
        <todo-list-block
            v-if="latestTodo"
            :items="latestTodo.items"
            :cli-type="store.cliType"
            class="floating-todo"
        ></todo-list-block>
        <pending-queue
            :items="pendingQueue"
            @remove="removePending"
            @update="updatePending"
        ></pending-queue>
        <input-bar
            :is-streaming="store.isStreaming"
            :disabled="false"
            @send="onSend"
            @stop="onStop"
        ></input-bar>
    </template>

    <div v-if="showDrawer" class="session-overlay" @click.self="showDrawer = false">
        <div class="session-drawer">
            <div class="drawer-header">
                <h3>{{ i18n.t('session.title') }}</h3>
                <div class="drawer-header-actions">
                    <button v-if="!editMode" class="icon-btn drawer-edit-btn" @click="enterEditMode">{{ i18n.t('session.edit') }}</button>
                    <template v-else>
                        <button class="icon-btn drawer-action-btn" @click="selectAllSessions">{{ i18n.t('session.selectAll') }}</button>
                        <button class="icon-btn drawer-delete-btn" :disabled="selectedSessions.length === 0" @click="confirmDelete">{{ i18n.t('session.delete') }}</button>
                        <button class="icon-btn" @click="exitEditMode">{{ i18n.t('session.cancel') }}</button>
                    </template>
                    <button class="icon-btn" @click="showDrawer = false">✕</button>
                </div>
            </div>
            <div class="drawer-list" @scroll="onDrawerScroll" ref="drawerList">
                <div v-if="sessions.length === 0" class="drawer-empty">{{ i18n.t('session.empty') }}</div>
                <div v-for="s in sessions" :key="s.sessionId" class="drawer-item" :class="{ selected: editMode && selectedSessions.indexOf(s.sessionId) >= 0 }" @click="onDrawerItemClick(s)">
                    <label v-if="editMode" class="drawer-checkbox" @click.stop>
                        <input type="checkbox" :checked="selectedSessions.indexOf(s.sessionId) >= 0" @change="toggleSelect(s.sessionId)" />
                        <span class="drawer-checkmark"></span>
                    </label>
                    <div class="dot" :class="(s.cliType || 'claude').toLowerCase()"></div>
                    <div class="drawer-item-info">
                        <div class="drawer-item-title">{{ s.title || s.sessionId }}</div>
                        <div class="drawer-item-meta">
                            <span v-if="s.model" class="drawer-item-model">{{ s.model }}</span>
                            {{ formatTime(s.updatedAt || s.createdAt) }}
                        </div>
                    </div>
                </div>
                <div v-if="hasMoreSessions" class="drawer-loadmore" @click="loadMoreSessions">{{ i18n.t('session.loadMore') }}</div>
            </div>
        </div>
    </div>
</div>
</template>
