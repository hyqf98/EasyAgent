                                {{ skillInstalling ? i18n.t('settings.skillInstalling') : i18n.t('settings.skillInstallConfirm') }}
                            </button>
                            <button class="ea-modal-btn ea-modal-btn-ghost" @click="onCancelInstallSkill">{{ i18n.t('settings.mcpCancel') }}</button>
                        </div>
                    </div>
                </div>

                <!-- Skill Content Modal -->
                <div class="ea-modal-overlay" v-if="skillContentDialog" @mousedown.self="onOverlayMouseDown($event)" @mouseup.self="onOverlayMouseUp($event, 'skillContent')">
                    <div class="ea-modal ea-modal-lg">
                        <div class="ea-modal-header">
                            <h4>{{ skillContentDialog.name }}</h4>
                            <button class="ea-modal-close" @click="skillContentDialog = null">×</button>
                        </div>
                        <div class="ea-modal-body">
                            <div class="md-content" v-if="skillContentDialog.htmlContent" v-html="skillContentDialog.htmlContent"></div>
                            <div v-if="skillContentDialog.content === null" class="mcp-test-empty">{{ i18n.t('settings.skillContentLoading') }}</div>
                            <div v-if="skillContentDialog.content !== null && !skillContentDialog.content" class="mcp-test-empty">{{ i18n.t('settings.skillContentEmpty') }}</div>
                        </div>
                        <div class="ea-modal-footer">
                            <button class="ea-modal-btn ea-modal-btn-ghost" @click="skillContentDialog = null">{{ i18n.t('settings.skillClose') }}</button>
                        </div>
                    </div>
                </div>

                <!-- Skills List -->
                <div class="mcp-list" v-if="skillList.length > 0">
                    <div class="mcp-card" v-for="item in skillList" :key="item.name + '-' + item.scope + '-' + item.skillPath">
                        <div class="mcp-card-header">
                            <span class="mcp-card-name">{{ item.name }}</span>
                            <span class="mcp-card-scope" :class="item.scope">{{ item.scope === 'user' ? i18n.t('settings.mcpScopeUser') : i18n.t('settings.mcpScopeProject') }}</span>
                            <span class="mcp-card-actions">
                                <button class="mcp-action-btn mcp-action-test" @click="onViewSkillContent(item)" :title="i18n.t('settings.skillView')">
                                    <span class="mcp-action-icon">📄</span>
                                    <span class="mcp-action-label">{{ i18n.t('settings.skillView') }}</span>
                                </button>
                                <button class="mcp-action-btn mcp-action-del" @click="onDeleteSkill(item)" :title="i18n.t('settings.skillDelete')">
                                    <span class="mcp-action-icon">×</span>
                                    <span class="mcp-action-label">{{ i18n.t('settings.skillDelete') }}</span>
                                </button>
                            </span>
                        </div>
                        <div class="mcp-card-body">
                            <span class="mcp-card-detail" v-if="item.description">
                                <span class="mcp-detail-value">{{ item.description }}</span>
                            </span>
                        </div>
                    </div>
                </div>
                <div v-if="skillList.length === 0 && !skillLoading" class="model-empty">{{ i18n.t('settings.skillEmpty') }}</div>
                <div v-if="skillLoading" class="model-loading-overlay">
                    <svg class="model-loading-spinner" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.3"/></svg>
                    <span>Loading...</span>
                    <button class="loading-cancel-btn" @click="skillLoading = false">{{ i18n.t('settings.cancelLoading') }}</button>
                </div>
            </div>
        </template>
        </ea-page-error-boundary>
    </div>
</div>
</template>
