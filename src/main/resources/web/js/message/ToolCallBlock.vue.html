<template>
<div class="tool-block" :class="[statusClass, toolKindClass]">
    <div class="tool-header" @click="$emit('toggle')">
        <span class="tool-icon">{{ toolIcon }}</span>
        <span class="tool-name">{{ displayTitle }}</span>
        <span class="tool-status">
            <span class="dot" :class="statusClass"></span>
            {{ statusLabel }}
        </span>
        <span class="chevron" :class="{ open: !collapsed }" style="margin-left:4px;font-size:10px;">▸</span>
    </div>
    <div class="tool-body" :class="collapsed ? 'collapsed' : 'expanded'">
        <div v-if="input" class="tool-section">
            <div class="tool-section-label">{{ i18n.t('tool.input') }}</div>
            <pre>{{ input }}</pre>
        </div>
        <div v-if="output" class="tool-section">
            <div class="tool-section-label">{{ i18n.t('tool.output') }}</div>
            <pre>{{ output }}</pre>
        </div>
        <div v-if="fileEdit" class="tool-file-actions">
            <div class="tool-file-meta">
                <span v-if="fileEdit.operation" class="tool-file-operation">{{ fileEdit.operation }}</span>
                <span class="tool-file-path" :title="fileEdit.path">{{ fileEdit.displayName || fileEdit.relativePath || fileEdit.path }}</span>
            </div>
            <div class="tool-file-action-buttons">
                <button type="button" class="tool-file-action-btn primary" @click.stop="viewChanges">{{ i18n.t('tool.viewChanges') }}</button>
            </div>
        </div>
    </div>
</div>
</template>
