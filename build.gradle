plugins {
    id 'java'
    id 'org.jetbrains.intellij.platform' version '2.15.0'
}

import org.gradle.api.tasks.compile.JavaCompile
import org.gradle.process.CommandLineArgumentProvider
import org.jetbrains.intellij.platform.gradle.tasks.RunIdeTask
import java.nio.file.FileSystems
import java.nio.file.FileVisitResult
import java.nio.file.Files
import java.nio.file.Path
import java.nio.file.SimpleFileVisitor
import java.nio.file.StandardCopyOption
import java.nio.file.StandardWatchEventKinds
import java.nio.file.WatchKey
import java.nio.file.attribute.BasicFileAttributes

group = 'io.github.easyagent'
version = '1.0.0'

def defaultRunIdeProjectDir = "/Users/haijun/Work/frontend/demo"

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

repositories {
    mavenCentral()
    intellijPlatform {
        defaultRepositories()
    }
}

dependencies {
    intellijPlatform {
        if (System.getenv('CI') == 'true') {
            intellijIdeaCommunity('2026.1')
        } else {
            local("/Applications/IntelliJ IDEA.app")
        }

        plugin("io.nimbly.mcp-companion:3.4.0")
    }

    compileOnly("org.projectlombok:lombok:1.18.36")
    annotationProcessor("org.projectlombok:lombok:1.18.36")
    testCompileOnly("org.projectlombok:lombok:1.18.36")
    testAnnotationProcessor("org.projectlombok:lombok:1.18.36")

    // TODO 后续按需引入 hutool
    // implementation("cn.hutool:hutool-all:5.8.34")
    implementation("org.slf4j:slf4j-api:2.0.13")
    implementation("ch.qos.logback:logback-classic:1.5.6")
    implementation("org.xerial:sqlite-jdbc:3.45.2.0")
    implementation("com.moandjiezana.toml:toml4j:0.7.2") {
        exclude group: 'com.google.code.gson', module: 'gson'
    }
    implementation("org.tomlj:tomlj:1.1.1")
    implementation("io.modelcontextprotocol.sdk:mcp:1.1.0")

    testImplementation("org.junit.jupiter:junit-jupiter-api:5.10.2")
    testImplementation("org.junit.jupiter:junit-jupiter-engine:5.10.2")
    testImplementation("org.junit.jupiter:junit-jupiter-params:5.10.2")
    testRuntimeOnly("org.junit.platform:junit-platform-launcher:1.10.2")
    testImplementation("org.mockito:mockito-core:5.11.0")
    testImplementation("org.assertj:assertj-core:3.25.3")
}

test {
    useJUnitPlatform()
    maxHeapSize = "512m"
}

processResources {
    exclude 'web/node_modules/**'
    exclude 'web/index-dev.html'
    exclude 'web/index-plan-dev.html'
    exclude 'web/dev-server.js'
    exclude 'web/index.generated.html'
    exclude 'web/.hotreload'
}

intellijPlatform {
    autoReload = true
    buildSearchableOptions = false
}

tasks.named('runIde', RunIdeTask) {
    argumentProviders.add({ [defaultRunIdeProjectDir] } as CommandLineArgumentProvider)
    jvmArgs = [
            '-Dide.browser.jcef.debug.port=9222',
            "-Deasyagent.project.dir=${project.projectDir.absolutePath}"
    ]
}

tasks.register('watchWebResources') {
    group = 'intellij platform'
    description = 'Watch web resources and copy on change for JCEF hot-reload'
    doLast {
        def srcDir = file('src/main/resources/web')
        def destDir = file('build/resources/main/web')
        if (!srcDir.exists()) return
        def markerFile = new File(destDir, '.hotreload')
        markerFile.parentFile.mkdirs()
        markerFile.text = String.valueOf(System.currentTimeMillis())
        println "[web-watch] Watching ${srcDir} -> ${destDir}"
        println "[web-watch] Press Ctrl+C to stop"
        FileSystems.getDefault().newWatchService().withCloseable { ws ->
            def registered = [:] as Map<WatchKey, Path>
            def registerRecursive = { Path dir ->
                try {
                    def key = dir.register(ws, StandardWatchEventKinds.ENTRY_MODIFY,
                            StandardWatchEventKinds.ENTRY_CREATE,
                            StandardWatchEventKinds.ENTRY_DELETE)
                    registered[key] = dir
                } catch (Exception ignored) {}
            }
            Files.walkFileTree(srcDir.toPath(), new SimpleFileVisitor<Path>() {
                @Override
                FileVisitResult preVisitDirectory(Path dir, BasicFileAttributes attrs) {
                    registerRecursive(dir)
                    return FileVisitResult.CONTINUE
                }
            })
            while (true) {
                def key = ws.take()
                def dir = registered[key]
                if (dir == null) { key.reset(); continue }
                for (def event : key.pollEvents()) {
                    def changedFile = dir.resolve(event.context() as String).toFile()
                    def relPath = srcDir.toPath().relativize(dir.resolve(event.context() as String)).toString()
                    def targetFile = new File(destDir, relPath)
                    if (event.kind() == StandardWatchEventKinds.ENTRY_DELETE) {
                        if (targetFile.exists()) targetFile.delete()
                        println "[web-watch] Deleted: ${relPath}"
                    } else {
                        if (changedFile.isDirectory() && event.kind() == StandardWatchEventKinds.ENTRY_CREATE) {
                            Files.walkFileTree(changedFile.toPath(), new SimpleFileVisitor<Path>() {
                                @Override
                                FileVisitResult preVisitDirectory(Path subDir, BasicFileAttributes attrs) {
                                    registerRecursive(subDir)
                                    return FileVisitResult.CONTINUE
                                }
                            })
                        }
                        targetFile.parentFile.mkdirs()
                        Files.copy(changedFile.toPath(), targetFile.toPath(),
                                StandardCopyOption.REPLACE_EXISTING)
                        println "[web-hotreload] ${relPath} -> ${targetFile} (${new Date().format('HH:mm:ss')})"
                    }
                    markerFile.text = String.valueOf(System.currentTimeMillis())
                }
                key.reset()
            }
        }
    }
}
